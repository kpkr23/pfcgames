<!DOCTYPE html>
<html lang="en">
<head>
 <meta name="google-adsense-account" content="ca-pub-6114394956903500">
 <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6114394956903500"
     crossorigin="anonymous"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>2048 – PFC Games</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;800&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#020617; font-family:'Outfit',sans-serif; color:#fff; min-height:100vh; overflow:hidden; touch-action:none; display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .bg { position:fixed; inset:0; z-index:-1; background:radial-gradient(ellipse at 20% 50%,rgba(112,0,255,0.08) 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(0,242,254,0.06) 0%,transparent 60%); }
  .game-header { position:fixed; top:0; left:0; right:0; z-index:100; display:flex; align-items:center; justify-content:space-between; padding:12px 20px; background:rgba(2,6,23,0.9); border-bottom:1px solid rgba(255,255,255,0.06); backdrop-filter:blur(20px); }
  .brand { display:flex; align-items:center; gap:10px; text-decoration:none; }
  .brand img { height:32px; width:auto; object-fit:contain; filter:drop-shadow(0 0 8px rgba(0,242,254,0.3)); }
  .brand-text { font-size:13px; font-weight:800; letter-spacing:2px; text-transform:uppercase; color:#fff; }
  .back-btn { display:inline-flex; align-items:center; gap:6px; padding:7px 14px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:8px; color:rgba(255,255,255,0.6); text-decoration:none; font-size:11px; font-weight:700; letter-spacing:1px; text-transform:uppercase; transition:all 0.3s ease; }
  .back-btn:hover { border-color:rgba(0,242,254,0.4); color:#00f2fe; }
  .game-title { margin-top:70px; font-size:clamp(18px,4vw,26px); font-weight:800; letter-spacing:3px; text-transform:uppercase; background:linear-gradient(135deg,#fff 40%,#00f2fe 100%); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:4px; text-align:center; }
  .stats { display:flex; gap:6px; flex-wrap:wrap; justify-content:center; margin-bottom:6px; }
  .stat-box { background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); border-radius:8px; padding:6px 14px; display:flex; flex-direction:column; align-items:center; gap:1px; }
  .stat-label { font-size:9px; color:rgba(255,255,255,0.3); letter-spacing:1.5px; text-transform:uppercase; }
  .stat-value { font-size:16px; font-weight:800; color:#00f2fe; }
  #target-bar { font-size:11px; color:rgba(255,255,255,0.25); letter-spacing:1px; margin-bottom:10px; text-align:center; }
  #target-bar b { color:#ffa502; font-size:13px; }
  #board {
    display:grid; grid-template-columns:repeat(4,1fr); gap:8px;
    background:rgba(255,255,255,0.03);
    border:1px solid rgba(255,255,255,0.07);
    border-radius:18px; padding:12px;
    width:min(380px,92vw);
    touch-action:none;
    box-shadow:0 0 0 1px rgba(0,242,254,0.08), 0 20px 60px rgba(0,0,0,0.4);
  }
  .cell { aspect-ratio:1; border-radius:10px; display:flex; align-items:center; justify-content:center; font-weight:800; transition:all 0.12s ease; }
  #msg { margin-top:10px; font-size:12px; color:rgba(255,255,255,0.3); letter-spacing:1px; text-align:center; }
  #msg b { color:#00f2fe; }
  #swipe-hint { font-size:10px; color:rgba(255,255,255,0.15); margin-top:4px; letter-spacing:1px; text-align:center; }
  #restart-btn { margin-top:10px; padding:10px 28px; background:linear-gradient(135deg,#00f2fe,#7000ff); border:none; border-radius:10px; color:#020617; font-family:'Outfit',sans-serif; font-size:13px; font-weight:800; letter-spacing:1px; text-transform:uppercase; cursor:pointer; box-shadow:0 8px 24px rgba(0,242,254,0.2); }
  .level-banner { position:fixed; inset:0; z-index:200; display:none; align-items:center; justify-content:center; background:rgba(2,6,23,0.85); backdrop-filter:blur(10px); }
  .level-banner.show { display:flex; }
  .banner-card { background:rgba(15,23,42,0.95); border:1px solid rgba(0,242,254,0.25); border-radius:20px; padding:36px 52px; text-align:center; box-shadow:0 0 60px rgba(0,242,254,0.1); }
  .banner-card img { height:44px; margin-bottom:16px; filter:drop-shadow(0 0 10px rgba(0,242,254,0.3)); }
  .banner-card h2 { font-size:32px; font-weight:800; color:#00f2fe; letter-spacing:2px; margin-bottom:8px; }
  .banner-card p { font-size:14px; color:rgba(255,255,255,0.4); }
  .game-footer { position:fixed; bottom:0; left:0; right:0; text-align:center; padding:6px; font-size:10px; color:rgba(255,255,255,0.1); letter-spacing:1px; text-transform:uppercase; }
</style>
</head>
<body>
  <div class="bg"></div>
  <div class="game-header">
    <a class="brand" href="../index.html">
      <img src="../pfc logo.png" alt="PFC Games">
      <span class="brand-text">PFC Games</span>
    </a>
    <a class="back-btn" href="../index.html">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
      Home
    </a>
  </div>

  <div class="game-title">🔢 2048</div>
  <div class="stats">
    <div class="stat-box"><span class="stat-label">Level</span><span class="stat-value" id="lvl">1</span></div>
    <div class="stat-box"><span class="stat-label">Score</span><span class="stat-value" id="score">0</span></div>
  </div>
  <div id="target-bar">Reach tile <b id="target-tile">256</b> to advance to next level</div>

  <div id="board"></div>
  <div id="msg">Swipe or use arrow keys to merge tiles</div>
  <div id="swipe-hint">← Swipe in any direction →</div>
  <button id="restart-btn">↺ Restart</button>

  <div class="level-banner" id="banner">
    <div class="banner-card">
      <img src="../pfc logo.png" alt="PFC Games">
      <h2 id="banner-title">Level 1</h2>
      <p id="banner-sub">Reach 256!</p>
    </div>
  </div>
  <div class="game-footer">© PFC Games Studio · All Rights Reserved</div>

<script>
  const COLORS={0:'rgba(255,255,255,0.03)',2:'#1e3a5f',4:'#1a4a7a',8:'#7000ff',16:'#5500cc',32:'#00b4d8',64:'#0077b6',128:'#f77f00',256:'#d62828',512:'#e9c46a',1024:'#2a9d8f',2048:'#00f2fe',4096:'#ff4757',8192:'#a29bfe'};
  const LEVEL_TARGETS=[256,512,1024,2048,4096];
  let grid,score=0,level=1,levelComplete=false;

  function showBanner(title,sub,cb){
    const b=document.getElementById('banner');
    document.getElementById('banner-title').textContent=title;
    document.getElementById('banner-sub').textContent=sub;
    b.classList.add('show');
    setTimeout(()=>{ b.classList.remove('show'); if(cb) cb(); },1800);
  }

  function newGrid(){ return Array.from({length:4},()=>Array(4).fill(0)); }

  function addRandom(g){
    const empty=[];
    g.forEach((r,i)=>r.forEach((v,j)=>{ if(!v) empty.push([i,j]); }));
    if(!empty.length) return;
    const [i,j]=empty[Math.floor(Math.random()*empty.length)];
    g[i][j]=Math.random()<0.9?2:4;
  }

  function startLevel(){
    grid=newGrid(); levelComplete=false;
    if(level>1){ for(let i=0;i<level-1;i++){ addRandom(grid); addRandom(grid); } }
    addRandom(grid); addRandom(grid);
    document.getElementById('lvl').textContent=level;
    document.getElementById('target-tile').textContent=LEVEL_TARGETS[level-1];
    document.getElementById('msg').innerHTML=`Level ${level} · Swipe or arrow keys`;
    render();
  }

  function init(){
    level=1; score=0; document.getElementById('score').textContent=0;
    showBanner('Level 1',`Reach ${LEVEL_TARGETS[0]} to advance!`,startLevel);
  }

  function slide(row){
    let arr=row.filter(v=>v),gained=0;
    for(let i=0;i<arr.length-1;i++) if(arr[i]===arr[i+1]){ arr[i]*=2; gained+=arr[i]; arr.splice(i+1,1); }
    while(arr.length<4) arr.push(0);
    return {arr,gained};
  }

  function move(dir){
    if(levelComplete) return;
    let moved=false,gained=0;
    const g=grid.map(r=>[...r]);
    if(dir==='left') g.forEach((r,i)=>{ const {arr,gained:g2}=slide(r); if(arr.join()!==r.join()) moved=true; grid[i]=arr; gained+=g2; });
    if(dir==='right') g.forEach((r,i)=>{ const rev=[...r].reverse(); const {arr,gained:g2}=slide(rev); arr.reverse(); if(arr.join()!==r.join()) moved=true; grid[i]=arr; gained+=g2; });
    if(dir==='up') for(let c=0;c<4;c++){ const col=g.map(r=>r[c]); const {arr,gained:g2}=slide(col); arr.forEach((v,r)=>{ if(v!==g[r][c]) moved=true; grid[r][c]=v; }); gained+=g2; }
    if(dir==='down') for(let c=0;c<4;c++){ const col=g.map(r=>r[c]).reverse(); const {arr,gained:g2}=slide(col); arr.reverse(); arr.forEach((v,r)=>{ if(v!==g[r][c]) moved=true; grid[r][c]=v; }); gained+=g2; }
    if(!moved) return;
    score+=gained; document.getElementById('score').textContent=score;
    addRandom(grid); render();
    const target=LEVEL_TARGETS[level-1];
    if(grid.flat().includes(target)&&!levelComplete){
      levelComplete=true;
      if(level>=LEVEL_TARGETS.length){ document.getElementById('msg').innerHTML=`🏆 All levels complete! Score: <b>${score}</b>`; return; }
      level++;
      setTimeout(()=>{ showBanner(`Level ${level}!`,`Now reach ${LEVEL_TARGETS[level-1]}!`,startLevel); },600);
    }
  }

  function render(){
    const board=document.getElementById('board');
    board.innerHTML='';
    const size=Math.floor((Math.min(380,window.innerWidth*0.92)-24-24)/4);
    grid.forEach(row=>row.forEach(v=>{
      const cell=document.createElement('div');
      cell.className='cell';
      cell.style.background=COLORS[v]||'#ff4757';
      cell.style.color=v?'#fff':'transparent';
      cell.style.fontSize=v>=10000?'12px':v>=1000?'16px':v>=100?'20px':'24px';
      cell.style.width=size+'px'; cell.style.height=size+'px';
      if(v===LEVEL_TARGETS[level-1]) cell.style.boxShadow='0 0 20px rgba(255,165,2,0.7), inset 0 0 10px rgba(255,165,2,0.1)';
      cell.textContent=v||'';
      board.appendChild(cell);
    }));
  }

  document.addEventListener('keydown',e=>{
    if(e.key==='Enter'){ init(); return; }
    const map={'ArrowLeft':'left','ArrowRight':'right','ArrowUp':'up','ArrowDown':'down'};
    if(map[e.key]){ e.preventDefault(); move(map[e.key]); }
  });

  let tx=0,ty=0;
  document.getElementById('board').addEventListener('touchstart',e=>{ tx=e.touches[0].clientX; ty=e.touches[0].clientY; },{passive:true});
  document.getElementById('board').addEventListener('touchend',e=>{
    const dx=e.changedTouches[0].clientX-tx, dy=e.changedTouches[0].clientY-ty;
    if(Math.abs(dx)<20&&Math.abs(dy)<20) return;
    if(Math.abs(dx)>Math.abs(dy)) move(dx>0?'right':'left');
    else move(dy>0?'down':'up');
  },{passive:true});

  document.getElementById('restart-btn').addEventListener('click',init);
  document.getElementById('restart-btn').addEventListener('touchstart',e=>{ e.preventDefault(); init(); },{passive:false});

  init();
</script>
</body>
</html>
