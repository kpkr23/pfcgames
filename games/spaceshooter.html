<!DOCTYPE html>
<html lang="en">
<head>
 <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6114394956903500"
     crossorigin="anonymous"></script>
 <meta name="google-adsense-account" content="ca-pub-6114394956903500">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Space Shooter – PFC Games</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;800&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#020617; font-family:'Outfit',sans-serif; color:#fff; min-height:100vh; overflow:hidden; touch-action:none; display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .bg { position:fixed; inset:0; z-index:-1; background:radial-gradient(ellipse at 20% 50%,rgba(112,0,255,0.08) 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(0,242,254,0.06) 0%,transparent 60%); }
  .game-header { position:fixed; top:0; left:0; right:0; z-index:100; display:flex; align-items:center; justify-content:space-between; padding:12px 20px; background:rgba(2,6,23,0.9); border-bottom:1px solid rgba(255,255,255,0.06); backdrop-filter:blur(20px); }
  .brand { display:flex; align-items:center; gap:10px; text-decoration:none; }
  .brand img { height:32px; width:auto; object-fit:contain; filter:drop-shadow(0 0 8px rgba(0,242,254,0.3)); }
  .brand-text { font-size:13px; font-weight:800; letter-spacing:2px; text-transform:uppercase; color:#fff; }
  .back-btn { display:inline-flex; align-items:center; gap:6px; padding:7px 14px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:8px; color:rgba(255,255,255,0.6); text-decoration:none; font-size:11px; font-weight:700; letter-spacing:1px; text-transform:uppercase; transition:all 0.3s ease; }
  .back-btn:hover { border-color:rgba(0,242,254,0.4); color:#00f2fe; }
  .game-title { margin-top:70px; font-size:clamp(18px,4vw,26px); font-weight:800; letter-spacing:3px; text-transform:uppercase; background:linear-gradient(135deg,#fff 40%,#00f2fe 100%); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:4px; text-align:center; }
  .stats { display:flex; gap:6px; flex-wrap:wrap; justify-content:center; margin-bottom:10px; }
  .stat-box { background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); border-radius:8px; padding:6px 14px; display:flex; flex-direction:column; align-items:center; gap:1px; }
  .stat-label { font-size:9px; color:rgba(255,255,255,0.3); letter-spacing:1.5px; text-transform:uppercase; }
  .stat-value { font-size:16px; font-weight:800; color:#00f2fe; }
  .canvas-wrap { position:relative; border-radius:16px; overflow:hidden; box-shadow:0 0 0 1px rgba(0,242,254,0.15),0 20px 60px rgba(0,0,0,0.5); }
  canvas { display:block; max-width:min(420px,98vw); }
  #msg { margin-top:8px; font-size:12px; color:rgba(255,255,255,0.3); letter-spacing:1px; text-align:center; }
  #msg b { color:#00f2fe; }
  #touch-controls { display:flex; gap:10px; margin-top:10px; align-items:center; }
  .t-btn { width:68px; height:56px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:22px; cursor:pointer; user-select:none; -webkit-tap-highlight-color:transparent; transition:all 0.1s ease; }
  .t-btn:active, .t-btn.pressed { background:rgba(0,242,254,0.15); border-color:rgba(0,242,254,0.4); transform:scale(0.93); }
  #shoot-btn { width:80px; height:56px; background:rgba(0,242,254,0.08); border-color:rgba(0,242,254,0.25); font-size:12px; font-weight:800; color:#00f2fe; letter-spacing:1px; flex-direction:column; gap:2px; }
  #start-btn { margin-top:10px; padding:11px 32px; background:linear-gradient(135deg,#00f2fe,#7000ff); border:none; border-radius:10px; color:#020617; font-family:'Outfit',sans-serif; font-size:13px; font-weight:800; letter-spacing:1px; text-transform:uppercase; cursor:pointer; box-shadow:0 8px 24px rgba(0,242,254,0.2); }
  .level-banner { position:fixed; inset:0; z-index:200; display:none; align-items:center; justify-content:center; background:rgba(2,6,23,0.85); backdrop-filter:blur(10px); }
  .level-banner.show { display:flex; }
  .banner-card { background:rgba(15,23,42,0.95); border:1px solid rgba(0,242,254,0.25); border-radius:20px; padding:36px 52px; text-align:center; box-shadow:0 0 60px rgba(0,242,254,0.1); }
  .banner-card img { height:44px; margin-bottom:16px; filter:drop-shadow(0 0 10px rgba(0,242,254,0.3)); }
  .banner-card h2 { font-size:32px; font-weight:800; color:#00f2fe; letter-spacing:2px; margin-bottom:8px; }
  .banner-card p { font-size:14px; color:rgba(255,255,255,0.4); }
  .game-footer { position:fixed; bottom:0; left:0; right:0; text-align:center; padding:6px; font-size:10px; color:rgba(255,255,255,0.1); letter-spacing:1px; text-transform:uppercase; }
</style>
</head>
<body>
  <div class="bg"></div>
  <div class="game-header">
    <a class="brand" href="../index.html">
      <img src="../pfc logo.png" alt="PFC Games">
      <span class="brand-text">PFC Games</span>
    </a>
    <a class="back-btn" href="../index.html">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
      Home
    </a>
  </div>

  <div class="game-title">🚀 Space Shooter</div>
  <div class="stats">
    <div class="stat-box"><span class="stat-label">Level</span><span class="stat-value" id="lvl">1</span></div>
    <div class="stat-box"><span class="stat-label">Score</span><span class="stat-value" id="score">0</span></div>
    <div class="stat-box"><span class="stat-label">Lives</span><span class="stat-value" id="lives">3</span></div>
  </div>

  <div class="canvas-wrap">
    <canvas id="c" width="420" height="380"></canvas>
  </div>
  <div id="msg">Tap <b>Start</b> · Use buttons to move & fire</div>
  <div id="touch-controls">
    <div class="t-btn" id="btn-left">◀</div>
    <div class="t-btn" id="shoot-btn">🔥<span style="font-size:10px;font-weight:800;">FIRE</span></div>
    <div class="t-btn" id="btn-right">▶</div>
  </div>
  <button id="start-btn">▶ Start Game</button>

  <div class="level-banner" id="banner">
    <div class="banner-card">
      <img src="../pfc logo.png" alt="PFC Games">
      <h2 id="banner-title">Level 1</h2>
      <p id="banner-sub">Destroy all enemies!</p>
    </div>
  </div>
  <div class="game-footer">© PFC Games Studio · All Rights Reserved</div>

<script>
  const canvas=document.getElementById('c'), ctx=canvas.getContext('2d');
  const W=canvas.width, H=canvas.height;
  const LEVELS=[
    {rows:2,cols:6,spd:0.4,shoot:0.003,bspd:5},{rows:2,cols:7,spd:0.5,shoot:0.004,bspd:5},
    {rows:3,cols:6,spd:0.6,shoot:0.005,bspd:6},{rows:3,cols:7,spd:0.7,shoot:0.006,bspd:6},
    {rows:3,cols:8,spd:0.8,shoot:0.007,bspd:7},{rows:4,cols:7,spd:0.9,shoot:0.008,bspd:7},
    {rows:4,cols:8,spd:1.0,shoot:0.009,bspd:8},{rows:4,cols:8,spd:1.2,shoot:0.010,bspd:8},
    {rows:5,cols:7,spd:1.3,shoot:0.012,bspd:9},{rows:5,cols:8,spd:1.5,shoot:0.015,bspd:9}
  ];
  let ship,bullets,enemies,stars,score=0,lives,running,raf,shootCool=0,enemyDir=1,enemySpd,level=1;
  let touchLeft=false,touchRight=false,touchShoot=false;

  function showBanner(title,sub,cb){
    const b=document.getElementById('banner');
    document.getElementById('banner-title').textContent=title;
    document.getElementById('banner-sub').textContent=sub;
    b.classList.add('show');
    setTimeout(()=>{ b.classList.remove('show'); if(cb) cb(); },1800);
  }

  function buildEnemies(){
    const cfg=LEVELS[level-1]; enemies=[];
    const startX=(W-(cfg.cols*50))/2+25;
    for(let r=0;r<cfg.rows;r++) for(let c=0;c<cfg.cols;c++)
      enemies.push({x:startX+c*50,y:40+r*38,w:26,h:18,alive:true,hp:level>=8?2:1});
    enemySpd=cfg.spd;
  }

  function startLevel(){
    ship={x:W/2,y:H-45,w:28,h:28};
    bullets=[]; lives=3; enemyDir=1;
    document.getElementById('lives').textContent=3;
    document.getElementById('lvl').textContent=level;
    stars=Array.from({length:80},()=>({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.5+0.3,s:Math.random()*1.2+0.3}));
    buildEnemies();
    running=true; cancelAnimationFrame(raf);
    document.getElementById('msg').innerHTML=`Level ${level} · ◀ ▶ Move · 🔥 Fire`;
    document.getElementById('start-btn').style.display='none';
    tick();
  }

  function init(){
    level=1; score=0; document.getElementById('score').textContent=0;
    showBanner('Level 1',`${LEVELS[0].rows} rows of enemies!`,startLevel);
  }

  function tick(){ if(!running) return; update(); draw(); raf=requestAnimationFrame(tick); }

  function update(){
    const cfg=LEVELS[level-1];
    stars.forEach(s=>{ s.y+=s.s; if(s.y>H) s.y=0; });
    if(touchLeft&&ship.x>ship.w/2) ship.x-=5;
    if(touchRight&&ship.x<W-ship.w/2) ship.x+=5;
    if(touchShoot&&shootCool<=0){ bullets.push({x:ship.x,y:ship.y-ship.h/2,w:3,h:12,spd:cfg.bspd}); shootCool=12; }
    if(shootCool>0) shootCool--;
    bullets.forEach(b=>{ if(!b.enemy) b.y-=b.spd; else b.y+=b.spd; });
    bullets=bullets.filter(b=>b.y>-20&&b.y<H+20);
    let edgeHit=false;
    enemies.forEach(e=>{ if(e.alive){ e.x+=enemyDir*enemySpd; if(e.x>W-16||e.x<16) edgeHit=true; }});
    if(edgeHit){ enemyDir*=-1; enemies.forEach(e=>{ if(e.alive) e.y+=16; }); enemySpd+=0.05; }
    bullets.forEach(b=>{
      if(b.enemy) return;
      enemies.forEach(e=>{
        if(!e.alive) return;
        if(b.x>e.x-e.w/2&&b.x<e.x+e.w/2&&b.y>e.y-e.h/2&&b.y<e.y+e.h/2){
          e.hp--; b.y=-99;
          if(e.hp<=0){ e.alive=false; score+=level*10; document.getElementById('score').textContent=score; }
        }
      });
    });
    enemies.forEach(e=>{ if(e.alive&&e.y+e.h/2>ship.y-ship.h/2) lives=0; });
    if(Math.random()<cfg.shoot){
      const alive=enemies.filter(e=>e.alive);
      if(alive.length){ const e=alive[Math.floor(Math.random()*alive.length)]; bullets.push({x:e.x,y:e.y+e.h/2,w:3,h:10,spd:cfg.bspd*0.7,enemy:true}); }
    }
    bullets.forEach(b=>{
      if(b.enemy&&Math.abs(b.x-ship.x)<ship.w/2&&Math.abs(b.y-ship.y)<ship.h/2){
        lives--; document.getElementById('lives').textContent=lives; b.y=-99;
      }
    });
    if(lives<=0){ running=false; cancelAnimationFrame(raf); document.getElementById('msg').innerHTML=`💀 Game Over! Score: <b>${score}</b>`; document.getElementById('start-btn').style.display='block'; document.getElementById('start-btn').textContent='↺ Restart'; return; }
    if(enemies.every(e=>!e.alive)){
      running=false; cancelAnimationFrame(raf);
      if(level>=LEVELS.length){ document.getElementById('msg').innerHTML=`🏆 All levels complete! Score: <b>${score}</b>`; document.getElementById('start-btn').style.display='block'; document.getElementById('start-btn').textContent='▶ Play Again'; return; }
      level++;
      showBanner(`Level ${level}!`,`More enemies · Faster fire!`,startLevel);
    }
  }

  function draw(){
    ctx.fillStyle='#020617'; ctx.fillRect(0,0,W,H);
    const pg=ctx.createLinearGradient(0,0,W,0); pg.addColorStop(0,'#00f2fe'); pg.addColorStop(1,'#7000ff');
    ctx.fillStyle='rgba(0,242,254,0.06)'; ctx.fillRect(0,0,W,3);
    ctx.fillStyle=pg; ctx.fillRect(0,0,W*(level/LEVELS.length),3);
    stars.forEach(s=>{ ctx.fillStyle=`rgba(255,255,255,${s.r*0.4})`; ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill(); });
    enemies.forEach(e=>{
      if(!e.alive) return;
      const ec=e.hp>1?'#ffa502':'#ff4757';
      ctx.shadowColor=ec; ctx.shadowBlur=8;
      ctx.fillStyle=ec;
      ctx.beginPath(); ctx.moveTo(e.x,e.y-e.h/2); ctx.lineTo(e.x+e.w/2,e.y+e.h/2); ctx.lineTo(e.x-e.w/2,e.y+e.h/2); ctx.closePath(); ctx.fill();
      ctx.shadowBlur=0;
    });
    bullets.forEach(b=>{
      ctx.shadowColor=b.enemy?'#ff4757':'#00f2fe'; ctx.shadowBlur=8;
      ctx.fillStyle=b.enemy?'#ff4757':'#00f2fe';
      ctx.beginPath(); ctx.roundRect(b.x-b.w/2,b.y,b.w,b.h,2); ctx.fill();
      ctx.shadowBlur=0;
    });
    const g=ctx.createLinearGradient(ship.x-ship.w/2,ship.y,ship.x+ship.w/2,ship.y);
    g.addColorStop(0,'#00f2fe'); g.addColorStop(1,'#7000ff');
    ctx.shadowColor='#00f2fe'; ctx.shadowBlur=12;
    ctx.fillStyle=g;
    ctx.beginPath(); ctx.moveTo(ship.x,ship.y-ship.h/2); ctx.lineTo(ship.x+ship.w/2,ship.y+ship.h/2); ctx.lineTo(ship.x-ship.w/2,ship.y+ship.h/2); ctx.closePath(); ctx.fill();
    ctx.shadowBlur=0;
  }

  const keys={};
  document.addEventListener('keydown',e=>{ keys[e.key]=true; if(e.key==='Enter') init(); if(e.key===' ') e.preventDefault(); });
  document.addEventListener('keyup',e=>{ keys[e.key]=false; });
  setInterval(()=>{
    if(keys['ArrowLeft']) touchLeft=true; else if(!document.getElementById('btn-left').classList.contains('pressed')) touchLeft=false;
    if(keys['ArrowRight']) touchRight=true; else if(!document.getElementById('btn-right').classList.contains('pressed')) touchRight=false;
    if(keys[' ']) touchShoot=true; else if(!document.getElementById('shoot-btn').classList.contains('pressed')) touchShoot=false;
  },16);

  function bindBtn(id,onStart,onEnd){
    const el=document.getElementById(id);
    el.addEventListener('touchstart',e=>{ e.preventDefault(); el.classList.add('pressed'); onStart(); },{passive:false});
    el.addEventListener('touchend',e=>{ e.preventDefault(); el.classList.remove('pressed'); onEnd(); },{passive:false});
    el.addEventListener('mousedown',()=>{ el.classList.add('pressed'); onStart(); });
    el.addEventListener('mouseup',()=>{ el.classList.remove('pressed'); onEnd(); });
  }
  bindBtn('btn-left',()=>touchLeft=true,()=>touchLeft=false);
  bindBtn('btn-right',()=>touchRight=true,()=>touchRight=false);
  bindBtn('shoot-btn',()=>touchShoot=true,()=>touchShoot=false);
  document.getElementById('start-btn').addEventListener('click',init);
  document.getElementById('start-btn').addEventListener('touchstart',e=>{ e.preventDefault(); init(); },{passive:false});
  draw();
</script>
</body>
</html>
