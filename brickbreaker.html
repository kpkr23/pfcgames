<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Brick Breaker – PFC Games</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;800&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#020617; font-family:'Outfit',sans-serif; color:#fff; min-height:100vh; overflow:hidden; touch-action:none; display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .bg { position:fixed; inset:0; z-index:-1; background:radial-gradient(ellipse at 20% 50%,rgba(112,0,255,0.08) 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(0,242,254,0.06) 0%,transparent 60%); }
  .game-header { position:fixed; top:0; left:0; right:0; z-index:100; display:flex; align-items:center; justify-content:space-between; padding:12px 20px; background:rgba(2,6,23,0.9); border-bottom:1px solid rgba(255,255,255,0.06); backdrop-filter:blur(20px); }
  .brand { display:flex; align-items:center; gap:10px; text-decoration:none; }
  .brand img { height:32px; width:auto; object-fit:contain; filter:drop-shadow(0 0 8px rgba(0,242,254,0.3)); }
  .brand-text { font-size:13px; font-weight:800; letter-spacing:2px; text-transform:uppercase; color:#fff; }
  .back-btn { display:inline-flex; align-items:center; gap:6px; padding:7px 14px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:8px; color:rgba(255,255,255,0.6); text-decoration:none; font-size:11px; font-weight:700; letter-spacing:1px; text-transform:uppercase; transition:all 0.3s ease; }
  .back-btn:hover { border-color:rgba(0,242,254,0.4); color:#00f2fe; }
  .game-title { margin-top:70px; font-size:clamp(18px,4vw,26px); font-weight:800; letter-spacing:3px; text-transform:uppercase; background:linear-gradient(135deg,#fff 40%,#00f2fe 100%); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:4px; text-align:center; }
  .stats { display:flex; gap:6px; flex-wrap:wrap; justify-content:center; margin-bottom:10px; }
  .stat-box { background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); border-radius:8px; padding:6px 14px; display:flex; flex-direction:column; align-items:center; gap:1px; }
  .stat-label { font-size:9px; color:rgba(255,255,255,0.3); letter-spacing:1.5px; text-transform:uppercase; }
  .stat-value { font-size:16px; font-weight:800; color:#00f2fe; }
  .canvas-wrap { position:relative; border-radius:16px; overflow:hidden; box-shadow:0 0 0 1px rgba(0,242,254,0.15),0 20px 60px rgba(0,0,0,0.5); }
  canvas { display:block; max-width:min(480px,98vw); cursor:none; touch-action:none; }
  #msg { margin-top:8px; font-size:12px; color:rgba(255,255,255,0.3); letter-spacing:1px; text-align:center; }
  #msg b { color:#00f2fe; }
  #start-btn { margin-top:12px; padding:11px 32px; background:linear-gradient(135deg,#00f2fe,#7000ff); border:none; border-radius:10px; color:#020617; font-family:'Outfit',sans-serif; font-size:13px; font-weight:800; letter-spacing:1px; text-transform:uppercase; cursor:pointer; box-shadow:0 8px 24px rgba(0,242,254,0.2); }
  .level-banner { position:fixed; inset:0; z-index:200; display:none; align-items:center; justify-content:center; background:rgba(2,6,23,0.85); backdrop-filter:blur(10px); }
  .level-banner.show { display:flex; }
  .banner-card { background:rgba(15,23,42,0.95); border:1px solid rgba(0,242,254,0.25); border-radius:20px; padding:36px 52px; text-align:center; box-shadow:0 0 60px rgba(0,242,254,0.1); }
  .banner-card img { height:44px; margin-bottom:16px; filter:drop-shadow(0 0 10px rgba(0,242,254,0.3)); }
  .banner-card h2 { font-size:32px; font-weight:800; color:#00f2fe; letter-spacing:2px; margin-bottom:8px; }
  .banner-card p { font-size:14px; color:rgba(255,255,255,0.4); }
  .game-footer { position:fixed; bottom:0; left:0; right:0; text-align:center; padding:6px; font-size:10px; color:rgba(255,255,255,0.1); letter-spacing:1px; text-transform:uppercase; }
</style>
</head>
<body>
  <div class="bg"></div>
  <div class="game-header">
    <a class="brand" href="../index.html">
      <img src="../pfc logo.png" alt="PFC Games">
      <span class="brand-text">PFC Games</span>
    </a>
    <a class="back-btn" href="../index.html">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
      Home
    </a>
  </div>

  <div class="game-title">🧱 Brick Breaker</div>
  <div class="stats">
    <div class="stat-box"><span class="stat-label">Level</span><span class="stat-value" id="lvl">1</span></div>
    <div class="stat-box"><span class="stat-label">Score</span><span class="stat-value" id="score">0</span></div>
    <div class="stat-box"><span class="stat-label">Lives</span><span class="stat-value" id="lives">3</span></div>
  </div>

  <div class="canvas-wrap">
    <canvas id="c" width="480" height="380"></canvas>
  </div>
  <div id="msg">Tap <b>Start</b> · Move finger or mouse to control paddle</div>
  <button id="start-btn">▶ Start Game</button>

  <div class="level-banner" id="banner">
    <div class="banner-card">
      <img src="../pfc logo.png" alt="PFC Games">
      <h2 id="banner-title">Level 1</h2>
      <p id="banner-sub">Break all bricks!</p>
    </div>
  </div>
  <div class="game-footer">© PFC Games Studio · All Rights Reserved</div>

<script>
  const canvas=document.getElementById('c'), ctx=canvas.getContext('2d');
  const W=canvas.width, H=canvas.height;
  const COLORS=['#ff4757','#ff6b81','#ffa502','#00f2fe','#7000ff','#2ed573','#eccc68','#a29bfe'];
  const LEVELS=[
    {rows:3,spd:4,pw:90},{rows:4,spd:4.5,pw:85},{rows:4,spd:5,pw:80},{rows:5,spd:5.5,pw:75},
    {rows:5,spd:6,pw:70},{rows:6,spd:6.5,pw:65},{rows:6,spd:7,pw:60},{rows:7,spd:7.5,pw:55},
    {rows:7,spd:8,pw:50},{rows:8,spd:9,pw:45}
  ];
  const COLS=8,BW=52,BH=16,BPAD=4;
  let ball,paddle,bricks,score=0,lives,running,raf,level=1;

  function showBanner(title,sub,cb){
    const b=document.getElementById('banner');
    document.getElementById('banner-title').textContent=title;
    document.getElementById('banner-sub').textContent=sub;
    b.classList.add('show');
    setTimeout(()=>{ b.classList.remove('show'); if(cb) cb(); },1800);
  }

  function buildBricks(rows){
    bricks=[];
    const offX=(W-COLS*(BW+BPAD))/2;
    for(let r=0;r<rows;r++) for(let c=0;c<COLS;c++)
      bricks.push({x:offX+c*(BW+BPAD),y:40+r*(BH+BPAD),w:BW,h:BH,color:COLORS[r%COLORS.length],alive:true});
  }

  function startLevel(){
    const cfg=LEVELS[level-1];
    const angle=-Math.PI/2+(Math.random()-0.5)*0.6;
    ball={x:W/2,y:H-80,vx:cfg.spd*Math.sin(angle),vy:cfg.spd*Math.cos(angle)*-1,r:8};
    paddle={x:W/2-cfg.pw/2,y:H-24,w:cfg.pw,h:12};
    lives=3;
    document.getElementById('lives').textContent=3;
    document.getElementById('lvl').textContent=level;
    buildBricks(cfg.rows);
    running=true; cancelAnimationFrame(raf);
    document.getElementById('msg').innerHTML=`Level ${level} · Move finger to control paddle`;
    document.getElementById('start-btn').style.display='none';
    tick();
  }

  function init(){
    level=1; score=0; document.getElementById('score').textContent=0;
    showBanner('Level 1','Break all bricks!',startLevel);
  }

  function tick(){ if(!running) return; update(); draw(); raf=requestAnimationFrame(tick); }

  function update(){
    ball.x+=ball.vx; ball.y+=ball.vy;
    if(ball.x-ball.r<0||ball.x+ball.r>W) ball.vx*=-1;
    if(ball.y-ball.r<0) ball.vy*=-1;
    if(ball.y+ball.r>H){
      lives--; document.getElementById('lives').textContent=lives;
      if(lives<=0){ running=false; cancelAnimationFrame(raf); document.getElementById('msg').innerHTML=`💀 Game Over! Score: <b>${score}</b>`; document.getElementById('start-btn').style.display='block'; document.getElementById('start-btn').textContent='↺ Restart'; return; }
      const cfg=LEVELS[level-1]; ball={x:W/2,y:H-80,vx:cfg.spd*0.7,vy:-cfg.spd,r:8};
    }
    if(ball.y+ball.r>paddle.y&&ball.y+ball.r<paddle.y+paddle.h&&ball.x>paddle.x&&ball.x<paddle.x+paddle.w){
      ball.vy=-Math.abs(ball.vy);
      ball.vx=((ball.x-(paddle.x+paddle.w/2))/(paddle.w/2))*LEVELS[level-1].spd;
    }
    bricks.forEach(b=>{
      if(!b.alive) return;
      if(ball.x>b.x&&ball.x<b.x+b.w&&ball.y-ball.r<b.y+b.h&&ball.y+ball.r>b.y){
        b.alive=false; ball.vy*=-1; score+=level*10; document.getElementById('score').textContent=score;
      }
    });
    if(bricks.every(b=>!b.alive)){
      running=false; cancelAnimationFrame(raf);
      if(level>=LEVELS.length){ document.getElementById('msg').innerHTML=`🏆 All levels complete! Score: <b>${score}</b>`; document.getElementById('start-btn').style.display='block'; document.getElementById('start-btn').textContent='▶ Play Again'; return; }
      level++;
      showBanner(`Level ${level}!`,`Faster ball · Smaller paddle!`,startLevel);
    }
  }

  function draw(){
    ctx.fillStyle='#020617'; ctx.fillRect(0,0,W,H);
    // level progress bar
    ctx.fillStyle='rgba(0,242,254,0.08)'; ctx.fillRect(0,0,W,3);
    const pg=ctx.createLinearGradient(0,0,W,0); pg.addColorStop(0,'#00f2fe'); pg.addColorStop(1,'#7000ff');
    ctx.fillStyle=pg; ctx.fillRect(0,0,W*(level/LEVELS.length),3);
    // bricks
    bricks.forEach(b=>{
      if(!b.alive) return;
      ctx.shadowColor=b.color; ctx.shadowBlur=6;
      ctx.fillStyle=b.color; ctx.beginPath(); ctx.roundRect(b.x,b.y,b.w,b.h,4); ctx.fill();
      ctx.shadowBlur=0;
    });
    // paddle
    const padg=ctx.createLinearGradient(paddle.x,0,paddle.x+paddle.w,0);
    padg.addColorStop(0,'#00f2fe'); padg.addColorStop(1,'#7000ff');
    ctx.shadowColor='#00f2fe'; ctx.shadowBlur=10;
    ctx.fillStyle=padg; ctx.beginPath(); ctx.roundRect(paddle.x,paddle.y,paddle.w,paddle.h,6); ctx.fill();
    ctx.shadowBlur=0;
    // ball
    const bg=ctx.createRadialGradient(ball.x,ball.y,0,ball.x,ball.y,ball.r);
    bg.addColorStop(0,'#fff'); bg.addColorStop(1,'#00f2fe');
    ctx.shadowColor='#00f2fe'; ctx.shadowBlur=14;
    ctx.fillStyle=bg; ctx.beginPath(); ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
  }

  function movePaddle(clientX){
    const rect=canvas.getBoundingClientRect();
    const x=(clientX-rect.left)*(W/rect.width);
    if(paddle) paddle.x=Math.max(0,Math.min(W-paddle.w,x-paddle.w/2));
  }

  canvas.addEventListener('mousemove',e=>movePaddle(e.clientX));
  canvas.addEventListener('touchmove',e=>{ e.preventDefault(); movePaddle(e.touches[0].clientX); },{passive:false});
  canvas.addEventListener('touchstart',e=>{ e.preventDefault(); movePaddle(e.touches[0].clientX); },{passive:false});
  document.addEventListener('keydown',e=>{ if(e.key==='Enter') init(); });
  document.getElementById('start-btn').addEventListener('click',init);
  document.getElementById('start-btn').addEventListener('touchstart',e=>{ e.preventDefault(); init(); },{passive:false});
  draw();
</script>
</body>
</html>
