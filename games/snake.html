<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Snake – PFC Games</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;800&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background:#020617;
    font-family:'Outfit',sans-serif;
    color:#fff;
    min-height:100vh;
    overflow:hidden;
    touch-action:none;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
  }

  /* Animated background */
  .bg {
    position:fixed; inset:0; z-index:-1;
    background: radial-gradient(ellipse at 20% 50%, rgba(112,0,255,0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(0,242,254,0.06) 0%, transparent 60%);
  }

  /* Header */
  .game-header {
    position:fixed; top:0; left:0; right:0; z-index:100;
    display:flex; align-items:center; justify-content:space-between;
    padding:12px 20px;
    background:rgba(2,6,23,0.9);
    border-bottom:1px solid rgba(255,255,255,0.06);
    backdrop-filter:blur(20px);
  }
  .brand { display:flex; align-items:center; gap:10px; text-decoration:none; }
  .brand img { height:32px; width:auto; object-fit:contain; filter:drop-shadow(0 0 8px rgba(0,242,254,0.3)); }
  .brand-text { font-size:13px; font-weight:800; letter-spacing:2px; text-transform:uppercase; color:#fff; }
  .back-btn {
    display:inline-flex; align-items:center; gap:6px;
    padding:7px 14px;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:8px; color:rgba(255,255,255,0.6);
    text-decoration:none; font-size:11px; font-weight:700;
    letter-spacing:1px; text-transform:uppercase;
    transition:all 0.3s ease;
  }
  .back-btn:hover { border-color:rgba(0,242,254,0.4); color:#00f2fe; }

  /* Game title */
  .game-title {
    margin-top:70px;
    font-size:clamp(18px,4vw,26px);
    font-weight:800; letter-spacing:3px; text-transform:uppercase;
    background:linear-gradient(135deg,#fff 40%,#00f2fe 100%);
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
    margin-bottom:4px; text-align:center;
  }

  /* Stats bar */
  .stats {
    display:flex; gap:6px; flex-wrap:wrap; justify-content:center;
    margin-bottom:10px;
  }
  .stat-box {
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:8px; padding:6px 14px;
    display:flex; flex-direction:column; align-items:center; gap:1px;
  }
  .stat-label { font-size:9px; color:rgba(255,255,255,0.3); letter-spacing:1.5px; text-transform:uppercase; }
  .stat-value { font-size:16px; font-weight:800; color:#00f2fe; }

  /* Canvas wrapper */
  .canvas-wrap {
    position:relative;
    border-radius:16px;
    overflow:hidden;
    box-shadow:0 0 0 1px rgba(0,242,254,0.15), 0 20px 60px rgba(0,0,0,0.5);
  }
  canvas { display:block; max-width:min(400px,95vw); max-height:min(400px,45vh); }

  /* Message */
  #msg {
    margin-top:8px; font-size:12px;
    color:rgba(255,255,255,0.3); letter-spacing:1px; text-align:center;
  }
  #msg b { color:#00f2fe; }

  /* D-pad */
  #dpad {
    display:grid;
    grid-template-columns:repeat(3,52px);
    grid-template-rows:repeat(3,52px);
    gap:5px; margin-top:10px;
  }
  .dpad-btn {
    width:52px; height:52px;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:12px;
    display:flex; align-items:center; justify-content:center;
    font-size:20px; cursor:pointer; user-select:none;
    -webkit-tap-highlight-color:transparent;
    transition:all 0.1s ease;
  }
  .dpad-btn:active, .dpad-btn.pressed {
    background:rgba(0,242,254,0.15);
    border-color:rgba(0,242,254,0.4);
    transform:scale(0.93);
  }
  .dpad-center {
    background:linear-gradient(135deg,rgba(0,242,254,0.15),rgba(112,0,255,0.15));
    border-color:rgba(0,242,254,0.2);
    font-size:11px; font-weight:800; color:#00f2fe; letter-spacing:1px;
  }
  .dpad-empty { visibility:hidden; }

  /* Level banner */
  .level-banner {
    position:fixed; inset:0; z-index:200;
    display:none; align-items:center; justify-content:center;
    background:rgba(2,6,23,0.85); backdrop-filter:blur(10px);
  }
  .level-banner.show { display:flex; }
  .banner-card {
    background:rgba(15,23,42,0.95);
    border:1px solid rgba(0,242,254,0.25);
    border-radius:20px; padding:36px 52px; text-align:center;
    box-shadow:0 0 60px rgba(0,242,254,0.1);
  }
  .banner-card img { height:44px; margin-bottom:16px; filter:drop-shadow(0 0 10px rgba(0,242,254,0.3)); }
  .banner-card h2 { font-size:32px; font-weight:800; color:#00f2fe; letter-spacing:2px; margin-bottom:8px; }
  .banner-card p { font-size:14px; color:rgba(255,255,255,0.4); }

  /* Footer brand */
  .game-footer {
    position:fixed; bottom:0; left:0; right:0;
    text-align:center; padding:6px;
    font-size:10px; color:rgba(255,255,255,0.1);
    letter-spacing:1px; text-transform:uppercase;
  }
</style>
</head>
<body>
  <div class="bg"></div>

  <!-- Header -->
  <div class="game-header">
    <a class="brand" href="../index.html">
      <img src="../pfc logo.png" alt="PFC Games">
      <span class="brand-text">PFC Games</span>
    </a>
    <a class="back-btn" href="../index.html">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
      Home
    </a>
  </div>

  <div class="game-title">🐍 Snake</div>

  <div class="stats">
    <div class="stat-box"><span class="stat-label">Level</span><span class="stat-value" id="lvl">1</span></div>
    <div class="stat-box"><span class="stat-label">Score</span><span class="stat-value" id="score">0</span></div>
    <div class="stat-box"><span class="stat-label">Best</span><span class="stat-value" id="best">0</span></div>
    <div class="stat-box"><span class="stat-label">Food</span><span class="stat-value"><span id="food-count">0</span>/<span id="food-need">5</span></span></div>
  </div>

  <div class="canvas-wrap">
    <canvas id="c" width="400" height="400"></canvas>
  </div>

  <div id="msg">Press <b>ENTER</b> or tap <b>GO</b> to start</div>

  <div id="dpad">
    <div class="dpad-empty"></div>
    <div class="dpad-btn" id="btn-up">▲</div>
    <div class="dpad-empty"></div>
    <div class="dpad-btn" id="btn-left">◀</div>
    <div class="dpad-btn dpad-center" id="btn-start">GO</div>
    <div class="dpad-btn" id="btn-right">▶</div>
    <div class="dpad-empty"></div>
    <div class="dpad-btn" id="btn-down">▼</div>
    <div class="dpad-empty"></div>
  </div>

  <!-- Level Banner -->
  <div class="level-banner" id="banner">
    <div class="banner-card">
      <img src="../pfc logo.png" alt="PFC Games">
      <h2 id="banner-title">Level 1</h2>
      <p id="banner-sub">Get ready!</p>
    </div>
  </div>

  <div class="game-footer">© PFC Games Studio · All Rights Reserved</div>

<script>
  const canvas=document.getElementById('c'), ctx=canvas.getContext('2d');
  const CELL=20, COLS=20, ROWS=20;
  const LEVELS=[
    {speed:160,need:5},{speed:140,need:7},{speed:120,need:9},{speed:105,need:11},
    {speed:90,need:13},{speed:78,need:15},{speed:68,need:17},{speed:58,need:19},
    {speed:50,need:21},{speed:40,need:25}
  ];
  let snake,dir,food,score,best=0,running=false,loop,level=1,foodEaten=0;

  function showBanner(title,sub,cb){
    const b=document.getElementById('banner');
    document.getElementById('banner-title').textContent=title;
    document.getElementById('banner-sub').textContent=sub;
    b.classList.add('show');
    setTimeout(()=>{ b.classList.remove('show'); if(cb) cb(); },1800);
  }

  function startLevel(){
    const cfg=LEVELS[level-1];
    snake=[{x:10,y:10},{x:9,y:10},{x:8,y:10}];
    dir={x:1,y:0}; foodEaten=0;
    placeFood(); updateInfo(); running=true;
    clearInterval(loop);
    loop=setInterval(tick,cfg.speed);
    document.getElementById('msg').innerHTML=`Level ${level} · D-pad or arrow keys`;
  }

  function init(){
    level=1; score=0; document.getElementById('score').textContent=0;
    showBanner('Level 1','Eat food to advance!',startLevel);
  }

  function placeFood(){
    do { food={x:Math.floor(Math.random()*COLS),y:Math.floor(Math.random()*ROWS)}; }
    while(snake.some(s=>s.x===food.x&&s.y===food.y));
  }

  function updateInfo(){
    document.getElementById('lvl').textContent=level;
    document.getElementById('score').textContent=score;
    document.getElementById('food-count').textContent=foodEaten;
    document.getElementById('food-need').textContent=LEVELS[level-1].need;
  }

  function tick(){
    const head={x:snake[0].x+dir.x,y:snake[0].y+dir.y};
    if(head.x<0||head.x>=COLS||head.y<0||head.y>=ROWS||snake.some(s=>s.x===head.x&&s.y===head.y)){
      clearInterval(loop); running=false;
      if(score>best){best=score; document.getElementById('best').textContent=best;}
      document.getElementById('msg').innerHTML=`💀 Game Over! Score: <b>${score}</b> · Tap GO to restart`;
      return;
    }
    snake.unshift(head);
    if(head.x===food.x&&head.y===food.y){
      score+=level*10; foodEaten++; updateInfo(); placeFood();
      if(foodEaten>=LEVELS[level-1].need){
        clearInterval(loop); running=false;
        if(level>=LEVELS.length){ document.getElementById('msg').innerHTML=`🏆 All 10 levels complete! Score: <b>${score}</b>`; return; }
        level++;
        showBanner(`Level ${level}!`,`Faster! Eat ${LEVELS[level-1].need} food`,startLevel);
        return;
      }
    } else snake.pop();
    draw();
  }

  function draw(){
    ctx.fillStyle='#020617'; ctx.fillRect(0,0,400,400);
    // grid dots
    ctx.fillStyle='rgba(255,255,255,0.02)';
    for(let x=0;x<COLS;x++) for(let y=0;y<ROWS;y++){
      ctx.beginPath(); ctx.arc(x*CELL+CELL/2,y*CELL+CELL/2,1,0,Math.PI*2); ctx.fill();
    }
    // progress bar
    const pct=foodEaten/LEVELS[level-1].need;
    ctx.fillStyle='rgba(255,255,255,0.04)'; ctx.fillRect(0,397,400,3);
    const pg=ctx.createLinearGradient(0,0,400,0); pg.addColorStop(0,'#00f2fe'); pg.addColorStop(1,'#7000ff');
    ctx.fillStyle=pg; ctx.fillRect(0,397,400*pct,3);
    // food glow
    ctx.shadowColor='#ff4757'; ctx.shadowBlur=12;
    ctx.fillStyle='#ff4757';
    ctx.beginPath(); ctx.arc(food.x*CELL+CELL/2,food.y*CELL+CELL/2,CELL/2-2,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
    // snake
    snake.forEach((s,i)=>{
      const g=ctx.createLinearGradient(s.x*CELL,s.y*CELL,s.x*CELL+CELL,s.y*CELL+CELL);
      g.addColorStop(0,i===0?'#00f2fe':'#7000ff'); g.addColorStop(1,i===0?'#7000ff':'#00f2fe');
      if(i===0){ ctx.shadowColor='#00f2fe'; ctx.shadowBlur=10; }
      ctx.fillStyle=g; ctx.beginPath(); ctx.roundRect(s.x*CELL+1,s.y*CELL+1,CELL-2,CELL-2,4); ctx.fill();
      ctx.shadowBlur=0;
    });
  }

  document.addEventListener('keydown',e=>{
    if(e.key==='Enter'){ init(); return; }
    if(!running) return;
    if(e.key==='ArrowUp'&&dir.y===0) dir={x:0,y:-1};
    else if(e.key==='ArrowDown'&&dir.y===0) dir={x:0,y:1};
    else if(e.key==='ArrowLeft'&&dir.x===0) dir={x:-1,y:0};
    else if(e.key==='ArrowRight'&&dir.x===0) dir={x:1,y:0};
  });

  function dpad(d){
    if(!running){ init(); return; }
    if(d==='up'&&dir.y===0) dir={x:0,y:-1};
    else if(d==='down'&&dir.y===0) dir={x:0,y:1};
    else if(d==='left'&&dir.x===0) dir={x:-1,y:0};
    else if(d==='right'&&dir.x===0) dir={x:1,y:0};
  }
  ['up','down','left','right'].forEach(d=>{
    const el=document.getElementById(`btn-${d}`);
    el.addEventListener('touchstart',e=>{e.preventDefault();dpad(d);},{passive:false});
    el.addEventListener('click',()=>dpad(d));
  });
  document.getElementById('btn-start').addEventListener('touchstart',e=>{e.preventDefault();init();},{passive:false});
  document.getElementById('btn-start').addEventListener('click',()=>init());

  draw();
</script>
</body>
</html>
